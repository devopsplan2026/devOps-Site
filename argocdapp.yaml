apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-site
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devopsplan2026/devOps-Site.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true       # deletes resources removed from Git
      selfHeal: true    # reverts manual changes made in the cluster
    syncOptions:
    - CreateNamespace=true   # creates destination namespace if missing
