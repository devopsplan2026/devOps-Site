server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/rss+xml
                      application/atom+xml image/svg+xml;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy    "accelerometer=(), camera=(), microphone=(), geolocation=()";

    # ── Cache static assets aggressively (1 year) ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML files - no cache (for SPA updates) ──────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ── SPA fallback – all routes served from index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ── Hide Nginx version from response headers ──────────────────────────────
    server_tokens off;

    # ── Performance tuning ────────────────────────────────────────────────────
    client_max_body_size 10M;
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
}
