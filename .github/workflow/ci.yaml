name: CI Pipeline

on:
push:
branches: [ "main" ]

jobs:
build-and-push:
runs-on: ubuntu-latest

```
env:
  IMAGE: hello-world

steps:
- name: Checkout Code
  uses: actions/checkout@v4

- name: Generate Version
  id: version
  run: echo "VERSION=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

- name: Login to DockerHub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USER }}
    password: ${{ secrets.DOCKER_PASS }}

- name: Build Docker Image
  run: docker build -t $IMAGE:${{ env.VERSION }} .

- name: Tag Image
  run: docker tag $IMAGE:${{ env.VERSION }} ${{ secrets.DOCKER_USER }}/$IMAGE:${{ env.VERSION }}

- name: Push Image
  run: docker push ${{ secrets.DOCKER_USER }}/$IMAGE:${{ env.VERSION }}
```


name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Build project
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5

  deploy-vercel:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}