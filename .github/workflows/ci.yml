name: Build & Deploy Image

on:
  push:
    # branches: [main] ##UNCOMMENT THIS WHEN YOU WANT TO USE THE FILE
    paths-ignore:
      - 'deployment.yaml'

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
        https://github.com/devopsplan2026/devOps-Site.git
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tag (timestamp)
        id: tag
        run: echo "value=$(date +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT
        # VERSION=2025-12-11-143025
        # Image name: 
        # mdmudsfikurrahamn/hello-world:2025-12-11-090512

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:${{ steps.tag.outputs.value }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:${{ steps.tag.outputs.value }}

      - name: Update deployment.yaml and commit
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:${{ steps.tag.outputs.value }}|" deployment.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Deploy new image ${{ steps.tag.outputs.value }}"
          git push
